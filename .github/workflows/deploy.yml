name: Deploy to ses.eth.limo

# Pins the built site to Filecoin and prints the Root CID in the run log.
# ENS is NOT updated here — no ses.eth key is ever exposed to CI. Copy the CID
# from the log into the Content Hash record (ipfs://<CID>) on app.ens.domains.
# Manual trigger only; run from the Actions tab when you want to publish.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Deploy with Omnipin
        run: pnpm dlx omnipin@1.7.0 deploy out --providers Filecoin --strict
        env:
          OMNIPIN_FILECOIN_TOKEN: ${{ secrets.OMNIPIN_FILECOIN_TOKEN }}
