name: Deploy to ses.eth.limo

# Pins the built site to Filecoin and prints the Root CID in the run log.
# ENS is NOT updated here — no ses.eth key is ever exposed to CI. Copy the CID
# from the log into the Content Hash record (ipfs://<CID>) on app.ens.domains.
# Manual trigger only; run from the Actions tab when you want to publish.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Installs `op`; scripts/deploy.sh reads the Filecoin key from 1Password.
      # Add OP_SERVICE_ACCOUNT_TOKEN (scoped to the Agents - Privileged vault) as
      # a repo secret — no raw private key is ever stored in CI.
      - uses: 1password/install-cli-action@v1

      - name: Build + deploy with Omnipin
        run: pnpm run deploy   # `pnpm deploy` is a reserved builtin; use `run`
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
